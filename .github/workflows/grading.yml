name: PR public grading

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  public-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout submitted code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f student_requirements.txt ]; then pip install -r student_requirements.txt; fi

      - name: Run public tests
        id: pytest
        continue-on-error: true
        run: |
          pytest public_tests -q --tb=short | tee pytest_output.txt

      - name: Generate grading summary
        if: always()
        run: |
          python grading/summarize_public_tests.py pytest_output.txt > grading_summary.md
          cat grading_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment grading summary on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('grading_summary.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail if public tests failed
        if: steps.pytest.outcome != 'success'
        run: exit 1
